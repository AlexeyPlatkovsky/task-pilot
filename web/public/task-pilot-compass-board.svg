  <rect x="50" y="58" width="7" height="16" rx="3" fill="#c65d2e"/>
  <rect x="61" y="58" width="7" height="16" rx="3" fill="#a94a22"/>
  <rect x="72" y="58" width="7" height="16" rx="3" fill="#8c3d1c"/>
