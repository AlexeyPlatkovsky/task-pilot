name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Tests
        id: tests
        run: |
          set +e
          uv run pytest --tb=short -q > pytest.out 2>&1
          rc=$?
          set -e
          cat pytest.out

          passed=$(grep -oP '\d+(?= passed)' pytest.out || echo 0)
          failed=$(grep -oP '\d+(?= failed)' pytest.out || echo 0)
          error=$(grep -oP '\d+(?= error)' pytest.out || echo 0)
          total=$((passed + failed + error))
          if [ "$total" -eq 0 ]; then
            total=$(grep -c '^' pytest.out 2>/dev/null || echo 0)
          fi
          if [ "$rc" -eq 0 ]; then ok=true; else ok=false; fi

          jq -n \
            --argjson ok "$ok" \
            --argjson passed "$passed" \
            --argjson total "$total" \
            '{name:"Tests",ok:$ok,passed:$passed,total:$total}' > result-tests.json

          exit $rc

      - name: Install ruff
        if: always()
        run: uv pip install ruff -q

      - name: Lint
        id: lint
        if: always()
        run: |
          set +e
          uv run ruff check . > lint.out 2>&1
          rc=$?
          set -e
          cat lint.out

          issues=$(grep -oP '\d+(?= error)' lint.out | tail -1 || echo 0)
          warnings=$(grep -oP '\d+(?= warning)' lint.out | tail -1 || echo 0)
          if [ -z "$issues" ]; then issues=0; fi
          if [ -z "$warnings" ]; then warnings=0; fi
          total=$((issues + warnings))
          if [ "$rc" -eq 0 ]; then ok=true; else ok=false; fi

          jq -n \
            --argjson ok "$ok" \
            --argjson issues "$total" \
            '{name:"Lint",ok:$ok,issues:$issues}' > result-lint.json

          exit $rc

      - name: Format
        id: format
        if: always()
        run: |
          set +e
          uv run ruff format --check . > format.out 2>&1
          rc=$?
          set -e
          cat format.out

          changed=$(grep -c "Would reformat" format.out 2>/dev/null) || changed=0
          if [ "$rc" -eq 0 ]; then ok=true; else ok=false; fi

          jq -n \
            --argjson ok "$ok" \
            --argjson changed "$changed" \
            '{name:"Format",ok:$ok,changed:$changed}' > result-format.json

          exit $rc

      - name: Setup Node
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Web dependencies
        if: always()
        run: npm ci --prefix web

      - name: Install Playwright browser
        if: always()
        run: npx --prefix web playwright install --with-deps chromium

      - name: E2E
        id: e2e
        if: always()
        run: |
          set +e
          npm run test:e2e:functional --prefix web > e2e.out 2>&1
          rc=$?
          set -e
          cat e2e.out

          passed=$(grep -oP '\d+(?= passed)' e2e.out | tail -1 || echo 0)
          failed=$(grep -oP '\d+(?= failed)' e2e.out | tail -1 || echo 0)
          total=$((passed + failed))
          if [ "$total" -eq 0 ]; then
            total=$(grep -oP 'Running \\K\\d+(?= tests?)' e2e.out | tail -1 || echo 0)
          fi
          if [ -z "$passed" ]; then passed=0; fi
          if [ -z "$total" ]; then total=0; fi
          if [ "$rc" -eq 0 ]; then ok=true; else ok=false; fi

          jq -n \
            --argjson ok "$ok" \
            --argjson passed "$passed" \
            --argjson total "$total" \
            '{name:"E2E",ok:$ok,passed:$passed,total:$total}' > result-e2e.json

          exit $rc

      - name: Comment PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          comment="## CI Results\n\n| Check | Result | Details |\n| --- | --- | --- |"

          for result_file in result-tests.json result-lint.json result-format.json result-e2e.json; do
            if [ ! -f "$result_file" ]; then
              name=$(echo "$result_file" | sed 's/result-//;s/.json//')
              comment="${comment}\n| ${name^} | ⚠️ | skipped |"
              continue
            fi

            name=$(jq -r .name "$result_file")

            if [ "$(jq -r .ok "$result_file")" = "true" ]; then
              emoji="✅"
            else
              emoji="❌"
            fi

            detail=""
            case "$name" in
              Tests)
                passed=$(jq -r .passed "$result_file")
                total=$(jq -r .total "$result_file")
                detail="${passed}/${total}"
                ;;
              Lint)
                issues=$(jq -r .issues "$result_file")
                detail="${issues} issue$([ "$issues" != "1" ] && echo s)"
                ;;
              Format)
                changed=$(jq -r .changed "$result_file")
                detail="${changed} file$([ "$changed" != "1" ] && echo s) would change"
                ;;
              E2E)
                passed=$(jq -r .passed "$result_file")
                total=$(jq -r .total "$result_file")
                detail="${passed}/${total}"
                ;;
            esac

            comment="${comment}\n| ${name} | ${emoji} | ${detail} |"
          done

          printf '%b\n' "$comment" | gh pr comment "$PR" --body-file -
