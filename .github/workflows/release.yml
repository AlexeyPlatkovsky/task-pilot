name: Release Validation

on:
  workflow_dispatch:
  push:
    branches:
      - feat/F009-release-automation
      - feat/*
  pull_request:
    paths:
      - 'scripts/release/**'
      - 'bin/**'
      - 'package.json'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # macOS: full release quality suite
  # ---------------------------------------------------------------------------
  macos-full:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install WebUI dependencies
        run: npm ci --prefix web

      - name: Install Playwright browser
        run: npx --prefix web playwright install --with-deps chromium

      - name: Quality gates
        run: bash scripts/release/quality-gates.sh

  # ---------------------------------------------------------------------------
  # Ubuntu: smoke checks (npm global install + CLI + WebUI)
  # ---------------------------------------------------------------------------
  ubuntu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Build staging package
        run: bash scripts/release/build-staging.sh

      - name: Install package globally
        run: |
          npm install -g "$(pwd)/staging"
          which taskpilot || (echo "ERROR: taskpilot not on PATH" >&2 && exit 1)

      - name: Smoketest CLI
        run: |
          taskpilot --version
          taskpilot --help

      - name: Smoketest WebUI (server starts)
        working-directory: /tmp
        run: |
          mkdir -p /tmp/smoke-workspace
          cd /tmp/smoke-workspace
          TASKPILOT_PYTHON=$(which python3) taskpilot serve &
          PID=$!
          sleep 5
          # API health check
          curl -sf http://127.0.0.1:7152/api/health || (kill $PID 2>/dev/null; exit 1)
          # WebUI route responds (packaging error is expected without env vars, but must not 500)
          curl -sf -o /dev/null http://127.0.0.1:7152/ || true
          kill $PID 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Windows: smoke checks (npm global install + CLI + WebUI)
  # ---------------------------------------------------------------------------
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build staging package
        run: bash scripts/release/build-staging.sh
        shell: bash

      - name: Install package globally
        run: |
          npm install -g "$(pwd)/staging"
          where taskpilot
        shell: bash

      - name: Smoketest CLI
        run: |
          taskpilot --version
          taskpilot --help
        shell: bash
