name: Release Validation

on:
  workflow_dispatch:
  push:
    branches:
      - feat/F009-release-automation
      - feat/*
  pull_request:
    paths:
      - 'scripts/release/**'
      - 'bin/**'
      - 'package.json'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # macOS: full release quality suite
  # ---------------------------------------------------------------------------
  macos-full:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install WebUI dependencies
        run: npm ci --prefix web

      - name: Install Playwright browser
        run: npx --prefix web playwright install --with-deps chromium

      - name: Quality gates
        run: bash scripts/release/quality-gates.sh

  # ---------------------------------------------------------------------------
  # Ubuntu: smoke checks (npm global install + CLI + WebUI)
  # ---------------------------------------------------------------------------
  ubuntu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Install WebUI dependencies
        run: npm ci --prefix web

      - name: Build staging package
        run: bash scripts/release/build-staging.sh

      - name: Install package globally
        run: |
          npm install -g "$(pwd)/staging"
          which taskpilot || (echo "ERROR: taskpilot not on PATH" >&2 && exit 1)

      - name: Smoketest CLI
        run: |
          taskpilot --version
          taskpilot --help

      - name: Smoketest WebUI (server starts)
        working-directory: /tmp
        run: |
          mkdir -p /tmp/smoke-workspace
          cd /tmp/smoke-workspace
          TASKPILOT_PYTHON=$(python3 -c "import sys; print(sys.executable)") taskpilot init . --key SM --name Smoke --id smoke
          TASKPILOT_PYTHON=$(python3 -c "import sys; print(sys.executable)") taskpilot serve &
          PID=$!

          # Retry health check up to 15 seconds
          healthy=false
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:7152/api/health >/dev/null 2>&1; then
              healthy=true
              break
            fi
            sleep 1
          done
          if [ "$healthy" != "true" ]; then
            echo "ERROR: API health check failed after 15s" >&2
            kill $PID 2>/dev/null || true
            exit 1
          fi

          web_status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7152/ || echo "000")
          if [ "$web_status" != "200" ]; then
            echo "ERROR: WebUI route returned $web_status, expected 200" >&2
            kill $PID 2>/dev/null || true
            exit 1
          fi

          kill $PID 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Windows: smoke checks (npm global install + CLI + WebUI)
  # ---------------------------------------------------------------------------
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install WebUI dependencies
        run: npm ci --prefix web
        shell: bash

      - name: Build staging package
        run: bash scripts/release/build-staging.sh
        shell: bash

      - name: Install package globally
        run: |
          npm install -g "$(pwd)/staging"
          where taskpilot
        shell: bash

      - name: Smoketest CLI
        run: |
          taskpilot --version
          taskpilot --help
        shell: bash

      - name: Smoketest WebUI (server starts)
        run: |
          mkdir -p /tmp/smoke-workspace
          cd /tmp/smoke-workspace
          TASKPILOT_PYTHON=$(python -c "import sys; print(sys.executable)") taskpilot init . --key SM --name Smoke --id smoke
          TASKPILOT_PYTHON=$(python -c "import sys; print(sys.executable)") taskpilot serve &
          PID=$!

          healthy=false
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:7152/api/health >/dev/null 2>&1; then
              healthy=true
              break
            fi
            sleep 1
          done
          if [ "$healthy" != "true" ]; then
            echo "ERROR: API health check failed after 15s" >&2
            kill $PID 2>/dev/null || true
            exit 1
          fi

          web_status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7152/ || echo "000")
          if [ "$web_status" != "200" ]; then
            echo "ERROR: WebUI route returned $web_status, expected 200" >&2
            kill $PID 2>/dev/null || true
            exit 1
          fi

          kill $PID 2>/dev/null || true
        shell: bash
